name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip git zip unzip \
            openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          printf "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a\n" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-tools-license

      - name: Build APK
        run: |
          yes | buildozer -v android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShinsooApp-APK
          path: bin/*.apk
          if-no-files-found: warn
